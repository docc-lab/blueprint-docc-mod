apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o /users/tomislav/blueprint-docc-mod/examples/dsb_sn/build_v2/k8s
    kompose.version: 1.37.0 (fb0539e64)
  labels:
    io.kompose.service: urlshorten-service-v2-ctr
  name: urlshorten-service-v2-ctr
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: urlshorten-service-v2-ctr
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o /users/tomislav/blueprint-docc-mod/examples/dsb_sn/build_v2/k8s
        kompose.version: 1.37.0 (fb0539e64)
      labels:
        io.kompose.service: urlshorten-service-v2-ctr
    spec:
      containers:
      - env:
        - name: OTELCOL_V2_DIAL_ADDR
          value: otelcol-v2-ctr:4317
        - name: URLSHORTEN_DB_V2_DIAL_ADDR
          value: urlshorten-db-v2-ctr:27017
        - name: URLSHORTEN_SERVICE_V2_GRPC_BIND_ADDR
          value: 0.0.0.0:12345
        image: 10.10.1.1:30000/urlshorten-service-v2-ctr:latest
        name: urlshorten-service-v2-ctr
        ports:
        - containerPort: 12345
          protocol: TCP
        resources:
          requests:
            cpu: 7000m
      hostname: urlshorten-service-v2-ctr
      restartPolicy: Always
      nodeSelector:
        kubernetes.io/hostname: node-7
