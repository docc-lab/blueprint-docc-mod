syntax="proto3";
option go_package="./;grpc";
package grpc;


message UrlShortenService_OTServerWrapperInterface_ComposeUrls_Request {
    sint64 reqID = 1;
    repeated string urls = 2;
    string traceCtx = 3;
}

message UrlShortenService_OTServerWrapperInterface_ComposeUrls_Response {
    repeated UrlShortenService_URL ret0 = 1;
}

message UrlShortenService_OTServerWrapperInterface_GetExtendedUrls_Request {
    sint64 reqID = 1;
    repeated string shortenedUrls = 2;
    string traceCtx = 3;
}

message UrlShortenService_OTServerWrapperInterface_GetExtendedUrls_Response {
    repeated string ret0 = 1;
}

message UrlShortenService_URL {
    string ShortenedUrl = 1;
    string ExpandedUrl = 2;
}

service UrlShortenService_OTServerWrapperInterface {
    rpc ComposeUrls (UrlShortenService_OTServerWrapperInterface_ComposeUrls_Request) returns (UrlShortenService_OTServerWrapperInterface_ComposeUrls_Response) {}
    rpc GetExtendedUrls (UrlShortenService_OTServerWrapperInterface_GetExtendedUrls_Request) returns (UrlShortenService_OTServerWrapperInterface_GetExtendedUrls_Response) {}
}

