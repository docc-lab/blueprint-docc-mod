syntax="proto3";
option go_package="./;grpc";
package grpc;


message UserTimelineService_OTServerWrapperInterface_ReadUserTimeline_Request {
    sint64 reqID = 1;
    sint64 userID = 2;
    sint64 start = 3;
    sint64 stop = 4;
    string traceCtx = 5;
}

message UserTimelineService_OTServerWrapperInterface_ReadUserTimeline_Response {
    repeated sint64 ret0 = 1;
}

message UserTimelineService_OTServerWrapperInterface_WriteUserTimeline_Request {
    sint64 reqID = 1;
    sint64 postID = 2;
    sint64 userID = 3;
    sint64 timestamp = 4;
    string traceCtx = 5;
}

message UserTimelineService_OTServerWrapperInterface_WriteUserTimeline_Response {
}

service UserTimelineService_OTServerWrapperInterface {
    rpc ReadUserTimeline (UserTimelineService_OTServerWrapperInterface_ReadUserTimeline_Request) returns (UserTimelineService_OTServerWrapperInterface_ReadUserTimeline_Response) {}
    rpc WriteUserTimeline (UserTimelineService_OTServerWrapperInterface_WriteUserTimeline_Request) returns (UserTimelineService_OTServerWrapperInterface_WriteUserTimeline_Response) {}
}

