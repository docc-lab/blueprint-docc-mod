syntax="proto3";
option go_package="./;grpc";
package grpc;


message UserIDService_OTServerWrapperInterface_GetUserId_Request {
    sint64 reqID = 1;
    string username = 2;
    string traceCtx = 3;
}

message UserIDService_OTServerWrapperInterface_GetUserId_Response {
    sint64 ret0 = 1;
}

service UserIDService_OTServerWrapperInterface {
    rpc GetUserId (UserIDService_OTServerWrapperInterface_GetUserId_Request) returns (UserIDService_OTServerWrapperInterface_GetUserId_Response) {}
}

