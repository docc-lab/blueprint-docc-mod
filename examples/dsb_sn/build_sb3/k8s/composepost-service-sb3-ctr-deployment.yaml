apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o /users/tomislav/blueprint-docc-mod/examples/dsb_sn/build_sb3/k8s
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: composepost-service-sb3-ctr
  name: composepost-service-sb3-ctr
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: composepost-service-sb3-ctr
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o /users/tomislav/blueprint-docc-mod/examples/dsb_sn/build_sb3/k8s
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: composepost-service-sb3-ctr
    spec:
      containers:
      - env:
        - name: COMPOSEPOST_SERVICE_SB3_GRPC_BIND_ADDR
          value: 0.0.0.0:12345
        - name: HOMETIMELINE_SERVICE_SB3_GRPC_DIAL_ADDR
          value: hometimeline-service-sb3-ctr:12345
        - name: MEDIA_SERVICE_SB3_GRPC_DIAL_ADDR
          value: media-service-sb3-ctr:12345
        - name: OTELCOL_SB3_DIAL_ADDR
          value: otelcol-sb3-ctr:4317
        - name: POST_STORAGE_SERVICE_SB3_GRPC_DIAL_ADDR
          value: post-storage-service-sb3-ctr:12345
        - name: TEXT_SERVICE_SB3_GRPC_DIAL_ADDR
          value: text-service-sb3-ctr:12345
        - name: UNIQUEID_SERVICE_SB3_GRPC_DIAL_ADDR
          value: uniqueid-service-sb3-ctr:12345
        - name: USERTIMELINE_SERVICE_SB3_GRPC_DIAL_ADDR
          value: usertimeline-service-sb3-ctr:12345
        - name: USER_SERVICE_SB3_GRPC_DIAL_ADDR
          value: user-service-sb3-ctr:12345
        image: 10.10.1.1:30000/composepost-service-sb3-ctr:latest
        name: composepost-service-sb3-ctr
        ports:
        - containerPort: 12345
          protocol: TCP
        resources:
          requests:
            cpu: 10000m
      hostname: composepost-service-sb3-ctr
      restartPolicy: Always
      nodeSelector:
        kubernetes.io/hostname: node-1
