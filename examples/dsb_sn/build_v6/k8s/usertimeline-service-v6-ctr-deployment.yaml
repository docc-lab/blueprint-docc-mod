apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o /users/tomislav/blueprint-docc-mod/examples/dsb_sn/build_v6/k8s
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: usertimeline-service-v6-ctr
  name: usertimeline-service-v6-ctr
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: usertimeline-service-v6-ctr
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o /users/tomislav/blueprint-docc-mod/examples/dsb_sn/build_v6/k8s
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: usertimeline-service-v6-ctr
    spec:
      containers:
      - env:
        - name: OTELCOL_V6_DIAL_ADDR
          value: otelcol-v6-ctr:4317
        - name: POST_STORAGE_SERVICE_V6_GRPC_DIAL_ADDR
          value: post-storage-service-v6-ctr:12345
        - name: USERTIMELINE_CACHE_V6_DIAL_ADDR
          value: usertimeline-cache-v6-ctr:6379
        - name: USERTIMELINE_DB_V6_DIAL_ADDR
          value: usertimeline-db-v6-ctr:27017
        - name: USERTIMELINE_SERVICE_V6_GRPC_BIND_ADDR
          value: 0.0.0.0:12345
        image: 10.10.1.1:30000/usertimeline-service-v6-ctr:latest
        name: usertimeline-service-v6-ctr
        ports:
        - containerPort: 12345
          protocol: TCP
        resources:
          requests:
            cpu: 15000m
      hostname: usertimeline-service-v6-ctr
      restartPolicy: Always
      nodeSelector:
        kubernetes.io/hostname: node-4
