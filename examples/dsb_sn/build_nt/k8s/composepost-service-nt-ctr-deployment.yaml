apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o /users/tomislav/blueprint-docc-mod/examples/dsb_sn/build_nt/k8s
    kompose.version: 1.37.0 (fb0539e64)
  labels:
    io.kompose.service: composepost-service-nt-ctr
  name: composepost-service-nt-ctr
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: composepost-service-nt-ctr
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o /users/tomislav/blueprint-docc-mod/examples/dsb_sn/build_nt/k8s
        kompose.version: 1.37.0 (fb0539e64)
      labels:
        io.kompose.service: composepost-service-nt-ctr
    spec:
      containers:
      - env:
        - name: COMPOSEPOST_SERVICE_NT_GRPC_BIND_ADDR
          value: 0.0.0.0:12345
        - name: HOMETIMELINE_SERVICE_NT_GRPC_DIAL_ADDR
          value: hometimeline-service-nt-ctr:12345
        - name: MEDIA_SERVICE_NT_GRPC_DIAL_ADDR
          value: media-service-nt-ctr:12345
        - name: POST_STORAGE_SERVICE_NT_GRPC_DIAL_ADDR
          value: post-storage-service-nt-ctr:12345
        - name: TEXT_SERVICE_NT_GRPC_DIAL_ADDR
          value: text-service-nt-ctr:12345
        - name: UNIQUEID_SERVICE_NT_GRPC_DIAL_ADDR
          value: uniqueid-service-nt-ctr:12345
        - name: USERTIMELINE_SERVICE_NT_GRPC_DIAL_ADDR
          value: usertimeline-service-nt-ctr:12345
        - name: USER_SERVICE_NT_GRPC_DIAL_ADDR
          value: user-service-nt-ctr:12345
        image: 10.10.1.1:30000/composepost-service-nt-ctr:latest
        name: composepost-service-nt-ctr
        ports:
        - containerPort: 12345
          protocol: TCP
        resources:
          requests:
            cpu: 12000m
      hostname: composepost-service-nt-ctr
      restartPolicy: Always
      nodeSelector:
        kubernetes.io/hostname: node-1
