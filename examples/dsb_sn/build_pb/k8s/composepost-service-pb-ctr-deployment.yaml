apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o /users/tomislav/blueprint-docc-mod/examples/dsb_sn/build_pb/k8s
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: composepost-service-pb-ctr
  name: composepost-service-pb-ctr
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: composepost-service-pb-ctr
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o /users/tomislav/blueprint-docc-mod/examples/dsb_sn/build_pb/k8s
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: composepost-service-pb-ctr
    spec:
      containers:
      - env:
        - name: COMPOSEPOST_SERVICE_PB_GRPC_BIND_ADDR
          value: 0.0.0.0:12345
        - name: HOMETIMELINE_SERVICE_PB_GRPC_DIAL_ADDR
          value: hometimeline-service-pb-ctr:12345
        - name: MEDIA_SERVICE_PB_GRPC_DIAL_ADDR
          value: media-service-pb-ctr:12345
        - name: OTELCOL_PB_DIAL_ADDR
          value: otelcol-pb-ctr:4317
        - name: POST_STORAGE_SERVICE_PB_GRPC_DIAL_ADDR
          value: post-storage-service-pb-ctr:12345
        - name: TEXT_SERVICE_PB_GRPC_DIAL_ADDR
          value: text-service-pb-ctr:12345
        - name: UNIQUEID_SERVICE_PB_GRPC_DIAL_ADDR
          value: uniqueid-service-pb-ctr:12345
        - name: USERTIMELINE_SERVICE_PB_GRPC_DIAL_ADDR
          value: usertimeline-service-pb-ctr:12345
        - name: USER_SERVICE_PB_GRPC_DIAL_ADDR
          value: user-service-pb-ctr:12345
        - name: GC_INTERVAL_SEC
          value: '0.01'
        - name: GOGC
          value: 'off'
        image: 10.10.1.1:30000/composepost-service-pb-ctr:latest
        name: composepost-service-pb-ctr
        ports:
        - containerPort: 12345
          protocol: TCP
        resources:
          requests:
            cpu: 10000m
      hostname: composepost-service-pb-ctr
      restartPolicy: Always
      nodeSelector:
        kubernetes.io/hostname: node-1
