apiVersion: apps/v1
kind: DaemonSet
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o /users/tomislav/blueprint-docc-mod/examples/dsb_sn/build_pb/k8s
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: wrk2api-service-pb-ctr
  name: wrk2api-service-pb-ctr
spec:
  selector:
    matchLabels:
      io.kompose.service: wrk2api-service-pb-ctr
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o /users/tomislav/blueprint-docc-mod/examples/dsb_sn/build_pb/k8s
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: wrk2api-service-pb-ctr
    spec:
      containers:
      - env:
        - name: COMPOSEPOST_SERVICE_PB_GRPC_DIAL_ADDR
          value: composepost-service-pb-ctr:12345
        - name: HOMETIMELINE_SERVICE_PB_GRPC_DIAL_ADDR
          value: hometimeline-service-pb-ctr:12345
        - name: OTELCOL_PB_DIAL_ADDR
          value: otelcol-pb-ctr:4317
        - name: SOCIALGRAPH_SERVICE_PB_GRPC_DIAL_ADDR
          value: socialgraph-service-pb-ctr:12345
        - name: USERTIMELINE_SERVICE_PB_GRPC_DIAL_ADDR
          value: usertimeline-service-pb-ctr:12345
        - name: USER_SERVICE_PB_GRPC_DIAL_ADDR
          value: user-service-pb-ctr:12345
        - name: WRK2API_SERVICE_PB_HTTP_BIND_ADDR
          value: 0.0.0.0:2000
        - name: GC_INTERVAL_SEC
          value: "0.01"
        - name: GOGC
          value: "off"
        image: 10.10.1.1:30000/wrk2api-service-pb-ctr:latest
        name: wrk2api-service-pb-ctr
        ports:
        - containerPort: 2000
          protocol: TCP
      hostname: wrk2api-service-pb-ctr
      restartPolicy: Always
