
version: '3'
services:

  composepost_service_pb_ctr:
    build:
      context: composepost_service_pb_ctr
      dockerfile: ./Dockerfile
    hostname: composepost_service_pb_ctr
    expose:
     - "12345"
    ports:
     - "${COMPOSEPOST_SERVICE_PB_GRPC_BIND_ADDR?composepost_service_pb.grpc.bind_addr must be set by the calling environment}:12345"
    environment:
     - COMPOSEPOST_SERVICE_PB_GRPC_BIND_ADDR=0.0.0.0:12345
     - HOMETIMELINE_SERVICE_PB_GRPC_DIAL_ADDR=hometimeline_service_pb_ctr:12345
     - MEDIA_SERVICE_PB_GRPC_DIAL_ADDR=media_service_pb_ctr:12345
     - OTELCOL_PB_DIAL_ADDR=otelcol_pb_ctr:4317
     - POST_STORAGE_SERVICE_PB_GRPC_DIAL_ADDR=post_storage_service_pb_ctr:12345
     - TEXT_SERVICE_PB_GRPC_DIAL_ADDR=text_service_pb_ctr:12345
     - UNIQUEID_SERVICE_PB_GRPC_DIAL_ADDR=uniqueid_service_pb_ctr:12345
     - USERTIMELINE_SERVICE_PB_GRPC_DIAL_ADDR=usertimeline_service_pb_ctr:12345
     - USER_SERVICE_PB_GRPC_DIAL_ADDR=user_service_pb_ctr:12345
    restart: always

  hometimeline_cache_pb_ctr:
    image: redis
    hostname: hometimeline_cache_pb_ctr
    expose:
     - "6379"
    ports:
     - "${HOMETIMELINE_CACHE_PB_BIND_ADDR?hometimeline_cache_pb.bind_addr must be set by the calling environment}:6379"
    restart: always

  hometimeline_service_pb_ctr:
    build:
      context: hometimeline_service_pb_ctr
      dockerfile: ./Dockerfile
    hostname: hometimeline_service_pb_ctr
    expose:
     - "12345"
    ports:
     - "${HOMETIMELINE_SERVICE_PB_GRPC_BIND_ADDR?hometimeline_service_pb.grpc.bind_addr must be set by the calling environment}:12345"
    environment:
     - HOMETIMELINE_CACHE_PB_DIAL_ADDR=hometimeline_cache_pb_ctr:6379
     - HOMETIMELINE_SERVICE_PB_GRPC_BIND_ADDR=0.0.0.0:12345
     - OTELCOL_PB_DIAL_ADDR=otelcol_pb_ctr:4317
     - POST_STORAGE_SERVICE_PB_GRPC_DIAL_ADDR=post_storage_service_pb_ctr:12345
     - SOCIALGRAPH_SERVICE_PB_GRPC_DIAL_ADDR=socialgraph_service_pb_ctr:12345
    restart: always

  jaeger_pb_ctr:
    image: jaegertracing/all-in-one:latest
    hostname: jaeger_pb_ctr
    expose:
     - "4317"
     - "14268"
     - "16686"
    ports:
     - "${JAEGER_PB_BIND_ADDR?jaeger_pb.bind_addr must be set by the calling environment}:14268"
     - "${JAEGER_PB_OTLP_BIND_ADDR?jaeger_pb.otlp.bind_addr must be set by the calling environment}:4317"
     - "${JAEGER_PB_UI_BIND_ADDR?jaeger_pb.ui.bind_addr must be set by the calling environment}:16686"
    environment:
     - QUERY_MAX_CLOCK_SKEW_ADJUSTMENT=1m
    restart: always

  media_service_pb_ctr:
    build:
      context: media_service_pb_ctr
      dockerfile: ./Dockerfile
    hostname: media_service_pb_ctr
    expose:
     - "12345"
    ports:
     - "${MEDIA_SERVICE_PB_GRPC_BIND_ADDR?media_service_pb.grpc.bind_addr must be set by the calling environment}:12345"
    environment:
     - MEDIA_SERVICE_PB_GRPC_BIND_ADDR=0.0.0.0:12345
     - OTELCOL_PB_DIAL_ADDR=otelcol_pb_ctr:4317
    restart: always

  otelcol_pb_ctr:
    build:
      context: otelcol_pb_ctr
      dockerfile: ./Dockerfile
    hostname: otelcol_pb_ctr
    expose:
     - "4317"
     - "8080"
    ports:
     - "${OTELCOL_PB_BIND_ADDR?otelcol_pb.bind_addr must be set by the calling environment}:4317"
     - "${OTELCOL_PB_IPDISCOVERY_BIND_ADDR?otelcol_pb.ipdiscovery.bind_addr must be set by the calling environment}:8080"
    environment:
     - JAEGER_PB_OTLP_DIAL_ADDR=jaeger_pb_ctr:4317
    restart: always

  post_cache_pb_ctr:
    image: redis
    hostname: post_cache_pb_ctr
    expose:
     - "6379"
    ports:
     - "${POST_CACHE_PB_BIND_ADDR?post_cache_pb.bind_addr must be set by the calling environment}:6379"
    restart: always

  post_db_pb_ctr:
    image: mongo
    hostname: post_db_pb_ctr
    expose:
     - "27017"
    ports:
     - "${POST_DB_PB_BIND_ADDR?post_db_pb.bind_addr must be set by the calling environment}:27017"
    restart: always

  post_storage_service_pb_ctr:
    build:
      context: post_storage_service_pb_ctr
      dockerfile: ./Dockerfile
    hostname: post_storage_service_pb_ctr
    expose:
     - "12345"
    ports:
     - "${POST_STORAGE_SERVICE_PB_GRPC_BIND_ADDR?post_storage_service_pb.grpc.bind_addr must be set by the calling environment}:12345"
    environment:
     - OTELCOL_PB_DIAL_ADDR=otelcol_pb_ctr:4317
     - POST_CACHE_PB_DIAL_ADDR=post_cache_pb_ctr:6379
     - POST_DB_PB_DIAL_ADDR=post_db_pb_ctr:27017
     - POST_STORAGE_SERVICE_PB_GRPC_BIND_ADDR=0.0.0.0:12345
    restart: always

  social_cache_pb_ctr:
    image: redis
    hostname: social_cache_pb_ctr
    expose:
     - "6379"
    ports:
     - "${SOCIAL_CACHE_PB_BIND_ADDR?social_cache_pb.bind_addr must be set by the calling environment}:6379"
    restart: always

  social_db_pb_ctr:
    image: mongo
    hostname: social_db_pb_ctr
    expose:
     - "27017"
    ports:
     - "${SOCIAL_DB_PB_BIND_ADDR?social_db_pb.bind_addr must be set by the calling environment}:27017"
    restart: always

  socialgraph_service_pb_ctr:
    build:
      context: socialgraph_service_pb_ctr
      dockerfile: ./Dockerfile
    hostname: socialgraph_service_pb_ctr
    expose:
     - "12345"
    ports:
     - "${SOCIALGRAPH_SERVICE_PB_GRPC_BIND_ADDR?socialgraph_service_pb.grpc.bind_addr must be set by the calling environment}:12345"
    environment:
     - OTELCOL_PB_DIAL_ADDR=otelcol_pb_ctr:4317
     - SOCIALGRAPH_SERVICE_PB_GRPC_BIND_ADDR=0.0.0.0:12345
     - SOCIAL_CACHE_PB_DIAL_ADDR=social_cache_pb_ctr:6379
     - SOCIAL_DB_PB_DIAL_ADDR=social_db_pb_ctr:27017
     - USERID_SERVICE_PB_GRPC_DIAL_ADDR=userid_service_pb_ctr:12345
    restart: always

  text_service_pb_ctr:
    build:
      context: text_service_pb_ctr
      dockerfile: ./Dockerfile
    hostname: text_service_pb_ctr
    expose:
     - "12345"
    ports:
     - "${TEXT_SERVICE_PB_GRPC_BIND_ADDR?text_service_pb.grpc.bind_addr must be set by the calling environment}:12345"
    environment:
     - OTELCOL_PB_DIAL_ADDR=otelcol_pb_ctr:4317
     - TEXT_SERVICE_PB_GRPC_BIND_ADDR=0.0.0.0:12345
     - URLSHORTEN_SERVICE_PB_GRPC_DIAL_ADDR=urlshorten_service_pb_ctr:12345
     - USERMENTION_SERVICE_PB_GRPC_DIAL_ADDR=usermention_service_pb_ctr:12345
    restart: always

  uniqueid_service_pb_ctr:
    build:
      context: uniqueid_service_pb_ctr
      dockerfile: ./Dockerfile
    hostname: uniqueid_service_pb_ctr
    expose:
     - "12345"
    ports:
     - "${UNIQUEID_SERVICE_PB_GRPC_BIND_ADDR?uniqueid_service_pb.grpc.bind_addr must be set by the calling environment}:12345"
    environment:
     - OTELCOL_PB_DIAL_ADDR=otelcol_pb_ctr:4317
     - UNIQUEID_SERVICE_PB_GRPC_BIND_ADDR=0.0.0.0:12345
    restart: always

  urlshorten_db_pb_ctr:
    image: mongo
    hostname: urlshorten_db_pb_ctr
    expose:
     - "27017"
    ports:
     - "${URLSHORTEN_DB_PB_BIND_ADDR?urlshorten_db_pb.bind_addr must be set by the calling environment}:27017"
    restart: always

  urlshorten_service_pb_ctr:
    build:
      context: urlshorten_service_pb_ctr
      dockerfile: ./Dockerfile
    hostname: urlshorten_service_pb_ctr
    expose:
     - "12345"
    ports:
     - "${URLSHORTEN_SERVICE_PB_GRPC_BIND_ADDR?urlshorten_service_pb.grpc.bind_addr must be set by the calling environment}:12345"
    environment:
     - OTELCOL_PB_DIAL_ADDR=otelcol_pb_ctr:4317
     - URLSHORTEN_DB_PB_DIAL_ADDR=urlshorten_db_pb_ctr:27017
     - URLSHORTEN_SERVICE_PB_GRPC_BIND_ADDR=0.0.0.0:12345
    restart: always

  user_cache_pb_ctr:
    image: redis
    hostname: user_cache_pb_ctr
    expose:
     - "6379"
    ports:
     - "${USER_CACHE_PB_BIND_ADDR?user_cache_pb.bind_addr must be set by the calling environment}:6379"
    restart: always

  user_db_pb_ctr:
    image: mongo
    hostname: user_db_pb_ctr
    expose:
     - "27017"
    ports:
     - "${USER_DB_PB_BIND_ADDR?user_db_pb.bind_addr must be set by the calling environment}:27017"
    restart: always

  user_service_pb_ctr:
    build:
      context: user_service_pb_ctr
      dockerfile: ./Dockerfile
    hostname: user_service_pb_ctr
    expose:
     - "12345"
    ports:
     - "${USER_SERVICE_PB_GRPC_BIND_ADDR?user_service_pb.grpc.bind_addr must be set by the calling environment}:12345"
    environment:
     - OTELCOL_PB_DIAL_ADDR=otelcol_pb_ctr:4317
     - SOCIALGRAPH_SERVICE_PB_GRPC_DIAL_ADDR=socialgraph_service_pb_ctr:12345
     - USER_CACHE_PB_DIAL_ADDR=user_cache_pb_ctr:6379
     - USER_DB_PB_DIAL_ADDR=user_db_pb_ctr:27017
     - USER_SERVICE_PB_GRPC_BIND_ADDR=0.0.0.0:12345
    restart: always

  userid_service_pb_ctr:
    build:
      context: userid_service_pb_ctr
      dockerfile: ./Dockerfile
    hostname: userid_service_pb_ctr
    expose:
     - "12345"
    ports:
     - "${USERID_SERVICE_PB_GRPC_BIND_ADDR?userid_service_pb.grpc.bind_addr must be set by the calling environment}:12345"
    environment:
     - OTELCOL_PB_DIAL_ADDR=otelcol_pb_ctr:4317
     - USERID_SERVICE_PB_GRPC_BIND_ADDR=0.0.0.0:12345
     - USER_CACHE_PB_DIAL_ADDR=user_cache_pb_ctr:6379
     - USER_DB_PB_DIAL_ADDR=user_db_pb_ctr:27017
    restart: always

  usermention_service_pb_ctr:
    build:
      context: usermention_service_pb_ctr
      dockerfile: ./Dockerfile
    hostname: usermention_service_pb_ctr
    expose:
     - "12345"
    ports:
     - "${USERMENTION_SERVICE_PB_GRPC_BIND_ADDR?usermention_service_pb.grpc.bind_addr must be set by the calling environment}:12345"
    environment:
     - OTELCOL_PB_DIAL_ADDR=otelcol_pb_ctr:4317
     - USERMENTION_SERVICE_PB_GRPC_BIND_ADDR=0.0.0.0:12345
     - USER_CACHE_PB_DIAL_ADDR=user_cache_pb_ctr:6379
     - USER_DB_PB_DIAL_ADDR=user_db_pb_ctr:27017
    restart: always

  usertimeline_cache_pb_ctr:
    image: redis
    hostname: usertimeline_cache_pb_ctr
    expose:
     - "6379"
    ports:
     - "${USERTIMELINE_CACHE_PB_BIND_ADDR?usertimeline_cache_pb.bind_addr must be set by the calling environment}:6379"
    restart: always

  usertimeline_db_pb_ctr:
    image: mongo
    hostname: usertimeline_db_pb_ctr
    expose:
     - "27017"
    ports:
     - "${USERTIMELINE_DB_PB_BIND_ADDR?usertimeline_db_pb.bind_addr must be set by the calling environment}:27017"
    restart: always

  usertimeline_service_pb_ctr:
    build:
      context: usertimeline_service_pb_ctr
      dockerfile: ./Dockerfile
    hostname: usertimeline_service_pb_ctr
    expose:
     - "12345"
    ports:
     - "${USERTIMELINE_SERVICE_PB_GRPC_BIND_ADDR?usertimeline_service_pb.grpc.bind_addr must be set by the calling environment}:12345"
    environment:
     - OTELCOL_PB_DIAL_ADDR=otelcol_pb_ctr:4317
     - POST_STORAGE_SERVICE_PB_GRPC_DIAL_ADDR=post_storage_service_pb_ctr:12345
     - USERTIMELINE_CACHE_PB_DIAL_ADDR=usertimeline_cache_pb_ctr:6379
     - USERTIMELINE_DB_PB_DIAL_ADDR=usertimeline_db_pb_ctr:27017
     - USERTIMELINE_SERVICE_PB_GRPC_BIND_ADDR=0.0.0.0:12345
    restart: always

  wrk2api_service_pb_ctr:
    build:
      context: wrk2api_service_pb_ctr
      dockerfile: ./Dockerfile
    hostname: wrk2api_service_pb_ctr
    expose:
     - "2000"
    ports:
     - "${WRK2API_SERVICE_PB_HTTP_BIND_ADDR?wrk2api_service_pb.http.bind_addr must be set by the calling environment}:2000"
    environment:
     - COMPOSEPOST_SERVICE_PB_GRPC_DIAL_ADDR=composepost_service_pb_ctr:12345
     - HOMETIMELINE_SERVICE_PB_GRPC_DIAL_ADDR=hometimeline_service_pb_ctr:12345
     - OTELCOL_PB_DIAL_ADDR=otelcol_pb_ctr:4317
     - SOCIALGRAPH_SERVICE_PB_GRPC_DIAL_ADDR=socialgraph_service_pb_ctr:12345
     - USERTIMELINE_SERVICE_PB_GRPC_DIAL_ADDR=usertimeline_service_pb_ctr:12345
     - USER_SERVICE_PB_GRPC_DIAL_ADDR=user_service_pb_ctr:12345
     - WRK2API_SERVICE_PB_HTTP_BIND_ADDR=0.0.0.0:2000
    restart: always

