apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o /users/tomislav/blueprint-docc-mod/examples/dsb_sn/build_nt2/k8s
    kompose.version: 1.37.0 (fb0539e64)
  labels:
    io.kompose.service: urlshorten-service-nt2-ctr
  name: urlshorten-service-nt2-ctr
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: urlshorten-service-nt2-ctr
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o /users/tomislav/blueprint-docc-mod/examples/dsb_sn/build_nt2/k8s
        kompose.version: 1.37.0 (fb0539e64)
      labels:
        io.kompose.service: urlshorten-service-nt2-ctr
    spec:
      containers:
      - env:
        - name: URLSHORTEN_DB_NT2_DIAL_ADDR
          value: urlshorten-db-nt2-ctr:27017
        - name: URLSHORTEN_SERVICE_NT2_GRPC_BIND_ADDR
          value: 0.0.0.0:12345
        image: 10.10.1.1:30000/urlshorten-service-nt2-ctr:latest
        name: urlshorten-service-nt2-ctr
        ports:
        - containerPort: 12345
          protocol: TCP
      hostname: urlshorten-service-nt2-ctr
      restartPolicy: Always
      nodeSelector:
        kubernetes.io/hostname: node-7
