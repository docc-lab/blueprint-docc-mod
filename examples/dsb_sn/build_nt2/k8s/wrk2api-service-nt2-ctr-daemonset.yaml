apiVersion: apps/v1
kind: DaemonSet
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o /users/tomislav/blueprint-docc-mod/examples/dsb_sn/build_nt2/k8s
    kompose.version: 1.37.0 (fb0539e64)
  labels:
    io.kompose.service: wrk2api-service-nt2-ctr
  name: wrk2api-service-nt2-ctr
spec:
  selector:
    matchLabels:
      io.kompose.service: wrk2api-service-nt2-ctr
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o /users/tomislav/blueprint-docc-mod/examples/dsb_sn/build_nt2/k8s
        kompose.version: 1.37.0 (fb0539e64)
      labels:
        io.kompose.service: wrk2api-service-nt2-ctr
    spec:
      containers:
      - env:
        - name: COMPOSEPOST_SERVICE_NT2_GRPC_DIAL_ADDR
          value: composepost-service-nt2-ctr:12345
        - name: HOMETIMELINE_SERVICE_NT2_GRPC_DIAL_ADDR
          value: hometimeline-service-nt2-ctr:12345
        - name: SOCIALGRAPH_SERVICE_NT2_GRPC_DIAL_ADDR
          value: socialgraph-service-nt2-ctr:12345
        - name: USERTIMELINE_SERVICE_NT2_GRPC_DIAL_ADDR
          value: usertimeline-service-nt2-ctr:12345
        - name: USER_SERVICE_NT2_GRPC_DIAL_ADDR
          value: user-service-nt2-ctr:12345
        - name: WRK2API_SERVICE_NT2_HTTP_BIND_ADDR
          value: 0.0.0.0:2000
        image: 10.10.1.1:30000/wrk2api-service-nt2-ctr:latest
        name: wrk2api-service-nt2-ctr
        ports:
        - containerPort: 2000
          protocol: TCP
      hostname: wrk2api-service-nt2-ctr
      restartPolicy: Always
