apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o /users/tomislav/blueprint-docc-mod/examples/dsb_sn/build_sb_rev0/k8s
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: urlshorten-service-sb-rev0-ctr
  name: urlshorten-service-sb-rev0-ctr
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: urlshorten-service-sb-rev0-ctr
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o /users/tomislav/blueprint-docc-mod/examples/dsb_sn/build_sb_rev0/k8s
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: urlshorten-service-sb-rev0-ctr
    spec:
      containers:
      - env:
        - name: BRIDGE_KIND
          value: sb
        - name: GC_INTERVAL_SEC
          value: '0.1'
        - name: GOGC
          value: 'off'
        - name: OTELCOL_SB_REV0_DIAL_ADDR
          value: otelcol-sb-rev0-ctr:4317
        - name: URLSHORTEN_DB_SB_REV0_DIAL_ADDR
          value: urlshorten-db-sb-rev0-ctr:27017
        - name: URLSHORTEN_SERVICE_SB_REV0_GRPC_BIND_ADDR
          value: 0.0.0.0:12345
        image: 10.10.1.1:30000/urlshorten-service-sb-rev0-ctr:latest
        name: urlshorten-service-sb-rev0-ctr
        ports:
        - containerPort: 12345
          protocol: TCP
        resources:
          requests:
            cpu: 3000m
      hostname: urlshorten-service-sb-rev0-ctr
      restartPolicy: Always
      nodeSelector:
        kubernetes.io/hostname: node-7
