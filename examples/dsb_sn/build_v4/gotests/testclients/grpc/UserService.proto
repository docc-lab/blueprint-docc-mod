syntax="proto3";
option go_package="./;grpc";
package grpc;


message UserService_Creator {
    sint64 UserID = 1;
    string Username = 2;
}

message UserService_OTServerWrapperInterface_ComposeCreatorWithUserId_Request {
    sint64 reqID = 1;
    sint64 userID = 2;
    string username = 3;
    string traceCtx = 4;
}

message UserService_OTServerWrapperInterface_ComposeCreatorWithUserId_Response {
    UserService_Creator ret0 = 1;
}

message UserService_OTServerWrapperInterface_ComposeCreatorWithUsername_Request {
    sint64 reqID = 1;
    string username = 2;
    string traceCtx = 3;
}

message UserService_OTServerWrapperInterface_ComposeCreatorWithUsername_Response {
    UserService_Creator ret0 = 1;
}

message UserService_OTServerWrapperInterface_Login_Request {
    sint64 reqID = 1;
    string username = 2;
    string password = 3;
    string traceCtx = 4;
}

message UserService_OTServerWrapperInterface_Login_Response {
    string ret0 = 1;
}

message UserService_OTServerWrapperInterface_RegisterUserWithId_Request {
    sint64 reqID = 1;
    string firstName = 2;
    string lastName = 3;
    string username = 4;
    string password = 5;
    sint64 userID = 6;
    string traceCtx = 7;
}

message UserService_OTServerWrapperInterface_RegisterUserWithId_Response {
}

message UserService_OTServerWrapperInterface_RegisterUser_Request {
    sint64 reqID = 1;
    string firstName = 2;
    string lastName = 3;
    string username = 4;
    string password = 5;
    string traceCtx = 6;
}

message UserService_OTServerWrapperInterface_RegisterUser_Response {
}

service UserService_OTServerWrapperInterface {
    rpc ComposeCreatorWithUserId (UserService_OTServerWrapperInterface_ComposeCreatorWithUserId_Request) returns (UserService_OTServerWrapperInterface_ComposeCreatorWithUserId_Response) {}
    rpc ComposeCreatorWithUsername (UserService_OTServerWrapperInterface_ComposeCreatorWithUsername_Request) returns (UserService_OTServerWrapperInterface_ComposeCreatorWithUsername_Response) {}
    rpc Login (UserService_OTServerWrapperInterface_Login_Request) returns (UserService_OTServerWrapperInterface_Login_Response) {}
    rpc RegisterUser (UserService_OTServerWrapperInterface_RegisterUser_Request) returns (UserService_OTServerWrapperInterface_RegisterUser_Response) {}
    rpc RegisterUserWithId (UserService_OTServerWrapperInterface_RegisterUserWithId_Request) returns (UserService_OTServerWrapperInterface_RegisterUserWithId_Response) {}
}

