apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o /users/tomislav/blueprint-docc-mod/examples/dsb_sn/build_cgpb/k8s
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: composepost-service-cgpb-ctr
  name: composepost-service-cgpb-ctr
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: composepost-service-cgpb-ctr
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o /users/tomislav/blueprint-docc-mod/examples/dsb_sn/build_cgpb/k8s
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: composepost-service-cgpb-ctr
    spec:
      containers:
      - env:
        - name: COMPOSEPOST_SERVICE_CGPB_GRPC_BIND_ADDR
          value: 0.0.0.0:12345
        - name: HOMETIMELINE_SERVICE_CGPB_GRPC_DIAL_ADDR
          value: hometimeline-service-cgpb-ctr:12345
        - name: MEDIA_SERVICE_CGPB_GRPC_DIAL_ADDR
          value: media-service-cgpb-ctr:12345
        - name: OTELCOL_CGPB_DIAL_ADDR
          value: otelcol-cgpb-ctr:4317
        - name: POST_STORAGE_SERVICE_CGPB_GRPC_DIAL_ADDR
          value: post-storage-service-cgpb-ctr:12345
        - name: TEXT_SERVICE_CGPB_GRPC_DIAL_ADDR
          value: text-service-cgpb-ctr:12345
        - name: UNIQUEID_SERVICE_CGPB_GRPC_DIAL_ADDR
          value: uniqueid-service-cgpb-ctr:12345
        - name: USERTIMELINE_SERVICE_CGPB_GRPC_DIAL_ADDR
          value: usertimeline-service-cgpb-ctr:12345
        - name: USER_SERVICE_CGPB_GRPC_DIAL_ADDR
          value: user-service-cgpb-ctr:12345
        - name: GC_INTERVAL_SEC
          value: "0.01"
        - name: GOGC
          value: "off"
        image: 10.10.1.1:30000/composepost-service-cgpb-ctr:latest
        name: composepost-service-cgpb-ctr
        ports:
        - containerPort: 12345
          protocol: TCP
      hostname: composepost-service-cgpb-ctr
      restartPolicy: Always
