apiVersion: apps/v1
kind: DaemonSet
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o /users/tomislav/blueprint-docc-mod/examples/dsb_sn/build_v5/k8s
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: wrk2api-service-v5-ctr
  name: wrk2api-service-v5-ctr
spec:
  selector:
    matchLabels:
      io.kompose.service: wrk2api-service-v5-ctr
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o /users/tomislav/blueprint-docc-mod/examples/dsb_sn/build_v5/k8s
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: wrk2api-service-v5-ctr
    spec:
      containers:
      - env:
        - name: COMPOSEPOST_SERVICE_V5_GRPC_DIAL_ADDR
          value: composepost-service-v5-ctr:12345
        - name: HOMETIMELINE_SERVICE_V5_GRPC_DIAL_ADDR
          value: hometimeline-service-v5-ctr:12345
        - name: OTELCOL_V5_DIAL_ADDR
          value: otelcol-v5-ctr:4317
        - name: SOCIALGRAPH_SERVICE_V5_GRPC_DIAL_ADDR
          value: socialgraph-service-v5-ctr:12345
        - name: USERTIMELINE_SERVICE_V5_GRPC_DIAL_ADDR
          value: usertimeline-service-v5-ctr:12345
        - name: USER_SERVICE_V5_GRPC_DIAL_ADDR
          value: user-service-v5-ctr:12345
        - name: WRK2API_SERVICE_V5_HTTP_BIND_ADDR
          value: 0.0.0.0:2000
        image: 10.10.1.1:30000/wrk2api-service-v5-ctr:latest
        name: wrk2api-service-v5-ctr
