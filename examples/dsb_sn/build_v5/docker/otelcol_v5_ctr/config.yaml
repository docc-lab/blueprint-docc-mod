exporters:
    debug:
        verbosity: detailed
    otlp:
        endpoint: ${JAEGER_V5_OTLP_DIAL_ADDR}
        tls:
            insecure: true
processors:
    batch: null
receivers:
    otlp:
        protocols:
            grpc:
                endpoint: 0.0.0.0:4317
service:
    pipelines:
        traces:
            exporters:
                - debug
                - otlp
            processors:
                - batch
            receivers:
                - otlp
    telemetry:
        logs:
            level: DEBUG
