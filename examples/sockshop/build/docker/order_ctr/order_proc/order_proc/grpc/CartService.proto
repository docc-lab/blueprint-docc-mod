syntax="proto3";
option go_package="./;grpc";
package grpc;


message CartService_AddItem_Request {
    string customerID = 1;
    CartService_Item item = 2;
}

message CartService_AddItem_Response {
    CartService_Item ret0 = 1;
}

message CartService_DeleteCart_Request {
    string customerID = 1;
}

message CartService_DeleteCart_Response {
}

message CartService_GetCart_Request {
    string customerID = 1;
}

message CartService_GetCart_Response {
    repeated CartService_Item ret0 = 1;
}

message CartService_GetItem_Request {
    string customerID = 1;
    string itemID = 2;
}

message CartService_GetItem_Response {
    CartService_Item ret0 = 1;
}

message CartService_Item {
    string ID = 1;
    sint64 Quantity = 2;
    float UnitPrice = 3;
}

message CartService_MergeCarts_Request {
    string customerID = 1;
    string sessionID = 2;
}

message CartService_MergeCarts_Response {
}

message CartService_RemoveItem_Request {
    string customerID = 1;
    string itemID = 2;
}

message CartService_RemoveItem_Response {
}

message CartService_UpdateItem_Request {
    string customerID = 1;
    CartService_Item item = 2;
}

message CartService_UpdateItem_Response {
}

service CartService {
    rpc AddItem (CartService_AddItem_Request) returns (CartService_AddItem_Response) {}
    rpc DeleteCart (CartService_DeleteCart_Request) returns (CartService_DeleteCart_Response) {}
    rpc GetCart (CartService_GetCart_Request) returns (CartService_GetCart_Response) {}
    rpc GetItem (CartService_GetItem_Request) returns (CartService_GetItem_Response) {}
    rpc MergeCarts (CartService_MergeCarts_Request) returns (CartService_MergeCarts_Response) {}
    rpc RemoveItem (CartService_RemoveItem_Request) returns (CartService_RemoveItem_Response) {}
    rpc UpdateItem (CartService_UpdateItem_Request) returns (CartService_UpdateItem_Response) {}
}

