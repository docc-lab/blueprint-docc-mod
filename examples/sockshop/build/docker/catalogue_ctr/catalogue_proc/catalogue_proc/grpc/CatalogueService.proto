syntax="proto3";
option go_package="./;grpc";
package grpc;


message CatalogueService_AddSock_Request {
    CatalogueService_Sock sock = 1;
}

message CatalogueService_AddSock_Response {
    string ret0 = 1;
}

message CatalogueService_AddTags_Request {
    repeated string tags = 1;
}

message CatalogueService_AddTags_Response {
}

message CatalogueService_Count_Request {
    repeated string tags = 1;
}

message CatalogueService_Count_Response {
    sint64 ret0 = 1;
}

message CatalogueService_DeleteSock_Request {
    string id = 1;
}

message CatalogueService_DeleteSock_Response {
}

message CatalogueService_Get_Request {
    string id = 1;
}

message CatalogueService_Get_Response {
    CatalogueService_Sock ret0 = 1;
}

message CatalogueService_List_Request {
    repeated string tags = 1;
    string order = 2;
    sint64 pageNum = 3;
    sint64 pageSize = 4;
}

message CatalogueService_List_Response {
    repeated CatalogueService_Sock ret0 = 1;
}

message CatalogueService_Sock {
    string ID = 1;
    string Name = 2;
    string Description = 3;
    repeated string ImageURL = 4;
    string ImageURL_1 = 5;
    string ImageURL_2 = 6;
    float Price = 7;
    sint64 Quantity = 8;
    repeated string Tags = 9;
    string TagString = 10;
}

message CatalogueService_Tags_Request {
}

message CatalogueService_Tags_Response {
    repeated string ret0 = 1;
}

service CatalogueService {
    rpc AddSock (CatalogueService_AddSock_Request) returns (CatalogueService_AddSock_Response) {}
    rpc AddTags (CatalogueService_AddTags_Request) returns (CatalogueService_AddTags_Response) {}
    rpc Count (CatalogueService_Count_Request) returns (CatalogueService_Count_Response) {}
    rpc DeleteSock (CatalogueService_DeleteSock_Request) returns (CatalogueService_DeleteSock_Response) {}
    rpc Get (CatalogueService_Get_Request) returns (CatalogueService_Get_Response) {}
    rpc List (CatalogueService_List_Request) returns (CatalogueService_List_Response) {}
    rpc Tags (CatalogueService_Tags_Request) returns (CatalogueService_Tags_Response) {}
}

