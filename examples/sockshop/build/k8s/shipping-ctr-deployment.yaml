apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o /users/maxLliu/blueprint-docc-mod/examples/sockshop/build/k8s
    kompose.version: 1.37.0 (fb0539e64)
  labels:
    io.kompose.service: shipping-ctr
  name: shipping-ctr
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: shipping-ctr
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o /users/maxLliu/blueprint-docc-mod/examples/sockshop/build/k8s
        kompose.version: 1.37.0 (fb0539e64)
      labels:
        io.kompose.service: shipping-ctr
    spec:
      containers:
      - env:
        - name: SHIPPING_DB_DIAL_ADDR
          value: shipping-db-ctr:27017
        - name: SHIPPING_SERVICE_GRPC_BIND_ADDR
          value: 0.0.0.0:12345
        - name: SHIPPING_SERVICE_GRPC_DIAL_ADDR
          value: shipping-ctr:12345
        image: 10.10.1.1:5000/shipping-ctr:latest
        name: shipping-ctr
        ports:
        - containerPort: 12345
          protocol: TCP
      hostname: shipping-ctr
      restartPolicy: Always
      nodeSelector:
        workload: sockshop
