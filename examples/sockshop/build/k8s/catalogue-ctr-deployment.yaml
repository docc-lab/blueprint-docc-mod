apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o /users/maxLliu/blueprint-docc-mod/examples/sockshop/build/k8s
    kompose.version: 1.37.0 (fb0539e64)
  labels:
    io.kompose.service: catalogue-ctr
  name: catalogue-ctr
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: catalogue-ctr
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o /users/maxLliu/blueprint-docc-mod/examples/sockshop/build/k8s
        kompose.version: 1.37.0 (fb0539e64)
      labels:
        io.kompose.service: catalogue-ctr
    spec:
      containers:
      - env:
        - name: CATALOGUE_DB_DIAL_ADDR
          value: catalogue-db-ctr:3306
        - name: CATALOGUE_SERVICE_GRPC_BIND_ADDR
          value: 0.0.0.0:12345
        image: 10.10.1.1:5000/catalogue-ctr:latest
        name: catalogue-ctr
        ports:
        - containerPort: 12345
          protocol: TCP
      hostname: catalogue-ctr
      restartPolicy: Always
      nodeSelector:
        workload: sockshop
