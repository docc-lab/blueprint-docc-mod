apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o /users/maxLliu/blueprint-docc-mod/examples/sockshop/build/k8s
    kompose.version: 1.37.0 (fb0539e64)
  labels:
    io.kompose.service: catalogue-db-ctr
  name: catalogue-db-ctr
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: catalogue-db-ctr
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o /users/maxLliu/blueprint-docc-mod/examples/sockshop/build/k8s
        kompose.version: 1.37.0 (fb0539e64)
      labels:
        io.kompose.service: catalogue-db-ctr
    spec:
      containers:
      - env:
        - name: MYSQL_ROOT_HOST
          value: '%'
        - name: MYSQL_ROOT_PASSWORD
          value: pass
        image: 10.10.1.1:5000/mysql-mysql-server:latest
        name: catalogue-db-ctr
        ports:
        - containerPort: 3306
          protocol: TCP
      hostname: catalogue-db-ctr
      restartPolicy: Always
      nodeSelector:
        workload: sockshop
