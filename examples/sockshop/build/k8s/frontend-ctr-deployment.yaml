apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o /users/maxLliu/blueprint-docc-mod/examples/sockshop/build/k8s
    kompose.version: 1.37.0 (fb0539e64)
  labels:
    io.kompose.service: frontend-ctr
  name: frontend-ctr
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: frontend-ctr
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o /users/maxLliu/blueprint-docc-mod/examples/sockshop/build/k8s
        kompose.version: 1.37.0 (fb0539e64)
      labels:
        io.kompose.service: frontend-ctr
    spec:
      containers:
      - env:
        - name: CART_SERVICE_GRPC_DIAL_ADDR
          value: cart-ctr:12345
        - name: CATALOGUE_SERVICE_GRPC_DIAL_ADDR
          value: catalogue-ctr:12345
        - name: FRONTEND_HTTP_BIND_ADDR
          value: 0.0.0.0:2000
        - name: ORDER_SERVICE_GRPC_DIAL_ADDR
          value: order-ctr:12345
        - name: USER_SERVICE_GRPC_DIAL_ADDR
          value: user-ctr:12345
        image: 10.10.1.1:5000/frontend-ctr:latest
        name: frontend-ctr
        ports:
        - containerPort: 2000
          protocol: TCP
      hostname: frontend-ctr
      restartPolicy: Always
      nodeSelector:
        workload: sockshop
