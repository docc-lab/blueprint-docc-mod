syntax="proto3";
option go_package="./;grpc";
package grpc;


message ShippingService_GetShipment_Request {
    string id = 1;
}

message ShippingService_GetShipment_Response {
    ShippingService_Shipment ret0 = 1;
}

message ShippingService_PostShipping_Request {
    ShippingService_Shipment shipment = 1;
}

message ShippingService_PostShipping_Response {
    ShippingService_Shipment ret0 = 1;
}

message ShippingService_Shipment {
    string ID = 1;
    string Name = 2;
    string Status = 3;
}

message ShippingService_UpdateStatus_Request {
    string id = 1;
    string status = 2;
}

message ShippingService_UpdateStatus_Response {
}

service ShippingService {
    rpc GetShipment (ShippingService_GetShipment_Request) returns (ShippingService_GetShipment_Response) {}
    rpc PostShipping (ShippingService_PostShipping_Request) returns (ShippingService_PostShipping_Response) {}
    rpc UpdateStatus (ShippingService_UpdateStatus_Request) returns (ShippingService_UpdateStatus_Response) {}
}

